spec:
  containers:
    - name: dep-&{ depname }
      image: &{ accname }.registry.snowflakecomputing.com/&{ dbsname }/&{ depname }/images/dep-&{ depname }:latest
      env:
        DEP_DBS: {{ dbsname | default('APPS', true) }}
        DEP_XMA: {{ depname | default('CORTEXAN', true) }}
        DEP_STG: {{ stgname | default('SEMANTICS', true) }}
      volumeMounts:
        - name: volume-stage
          mountPath: /opt/spcs/stage/
  endpoints:
    - name: dep-&{ depname }
      port: 8501
      public: true
  volumes:
    - name: volume-stage
      source: "@volumes"
      uid: 1000
      gid: 1000
serviceRoles:
  - name: &{ depname }_RAX
    endpoints:
    - dep-&{ depname }
